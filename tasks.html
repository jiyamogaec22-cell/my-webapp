<!DOCTYPE html>
<html>
  <head>
    <title>My Task Manager</title>
    <style>

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #f3f4f6;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        min-height: 100vh;
      }

      /* NAVBAR */
      .navbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        background: #1e1b4b;
        padding: 14px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      }

      .navbar .logo {
        color: #a5b4fc;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
      }

      .navbar .nav-links { display: flex; gap: 8px; }

      .navbar .nav-links a {
        color: #c7d2fe;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        transition: background 0.2s;
      }

      .navbar .nav-links a:hover { background: #3730a3; color: white; }
      .navbar .nav-links a.active { background: #4f46e5; color: white; }

      .navbar .btn-logout {
        background: #ef4444;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        text-decoration: none;
        font-weight: bold;
      }

      .navbar .btn-logout:hover { background: #dc2626; }

      .page-content {
        margin-top: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      h1 {
        font-size: 28px;
        color: #1e1b4b;
        margin-bottom: 24px;
      }

      .add-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        width: 100%;
        max-width: 500px;
      }

      .add-bar input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
      }

      .add-bar input:focus { border-color: #667eea; }

      .add-bar button {
        padding: 12px 20px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .add-bar button:hover { opacity: 0.85; }

      #taskList {
        list-style: none;
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .task-item {
        background: white;
        padding: 16px 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      }

      .task-text {
        flex: 1;
        font-size: 15px;
        color: #374151;
      }

      .task-text.done {
        text-decoration: line-through;
        color: #9ca3af;
      }

      .btn-done {
        padding: 6px 14px;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }

      .btn-done:hover { background: #059669; }

      .btn-delete {
        padding: 6px 14px;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }

      .btn-delete:hover { background: #dc2626; }

      .empty-msg {
        color: #9ca3af;
        font-size: 14px;
        margin-top: 20px;
      }

    </style>
  </head>

  <body>

    <!-- NAVBAR -->
    <nav class="navbar">
      <a class="logo" href="dashboard.html">🌐 MyApp</a>
      <div class="nav-links">
        <a href="dashboard.html">🏠 Home</a>
        <a href="tasks.html" class="active">📝 Tasks</a>
        <a href="contact.html">📩 Contact</a>
      </div>
      <a class="btn-logout" href="index.html">Logout</a>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <h1>📝 My Task Manager</h1>

      <div class="add-bar">
        <input type="text" id="taskInput" placeholder="Enter a task..." />
        <button id="addBtn">+ Add Task</button>
      </div>

      <ul id="taskList"></ul>

    </div>

    <!-- SCRIPT LAST -->
    <script>

      async function loadTasks() {
        let response = await fetch("https://unicorn07.pythonanywhere.com/task");
        let result   = await response.json();
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        if (result.tasks.length === 0) {
          list.innerHTML = "<p class='empty-msg'>No tasks yet! Add one above ☝️</p>";
          return;
        }

        result.tasks.forEach(function(task) {
          let li = document.createElement("li");
          li.className = "task-item";
          li.innerHTML = `
            <span class="task-text ${task.done ? 'done' : ''}">${task.text}</span>
            <button class="btn-done"   onclick="markDone(${task.id})">✅ Done</button>
            <button class="btn-delete" onclick="deleteTask(${task.id})">🗑️ Delete</button>
          `;
          list.appendChild(li);
        });
      }

      document.getElementById("addBtn").addEventListener("click", async function() {
        let taskText = document.getElementById("taskInput").value.trim();
        if (taskText === "") { alert("⚠️ Please type a task first!"); return; }

        await fetch("https://unicorn07.pythonanywhere.com/task" , {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ text: taskText })
        });

        document.getElementById("taskInput").value = "";
        loadTasks();
      });

      async function markDone(id) {
        await fetch("https://unicorn07.pythonanywhere.com/task" + id, { method: "PUT" });
        loadTasks();
      }

      async function deleteTask(id) {
        await fetch("https://unicorn07.pythonanywhere.com/task" + id, { method: "DELETE" });
        loadTasks();
      }

      loadTasks();

    </script>

  </body>
</html>
